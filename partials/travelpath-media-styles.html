{{/* travelpath-media-styles.html — Lightbox + Video + Audio CSS
     Identical to map-media-styles.html from the Maps plugin.
     Shared scratch keys prevent double-emission when coexisting. */}}
<style>
  /* Lightbox overlay (shared with Maps and Tracks) */
  .map-lightbox {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 10000;
    background: rgba(0,0,0,0.85);
    cursor: pointer;
    justify-content: center;
    align-items: center;
  }
  .map-lightbox.active { display: flex; }
  .map-lightbox img {
    max-width: 85vw;
    max-height: 85vh;
    border-radius: 4px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
    object-fit: contain;
    cursor: default;
  }
  .map-lightbox-caption {
    position: absolute;
    bottom: 20px;
    left: 0; right: 0;
    text-align: center;
    color: #ddd;
    font-family: sans-serif;
    font-size: 14px;
    pointer-events: none;
  }
  .map-lightbox-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: rgba(255,255,255,0.8);
    font-size: 36px;
    cursor: pointer;
    padding: 16px;
    line-height: 1;
    user-select: none;
    -webkit-user-select: none;
    transition: color 0.15s;
  }
  .map-lightbox-arrow:hover { color: #fff; }
  .map-lightbox-prev { left: 8px; }
  .map-lightbox-next { right: 8px; }
  .map-lightbox-counter {
    position: absolute;
    top: 16px;
    right: 20px;
    color: rgba(255,255,255,0.6);
    font-family: sans-serif;
    font-size: 14px;
    pointer-events: none;
  }
  /* Video player overlay */
  .map-video-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 10000;
    background: rgba(0,0,0,0.85);
    cursor: pointer;
    justify-content: center;
    align-items: center;
  }
  .map-video-overlay.active { display: flex; }
  .map-video-overlay .map-video-wrap {
    position: relative;
    max-width: 85vw;
    max-height: 85vh;
    cursor: default;
  }
  .map-video-overlay video {
    display: block;
    max-width: 85vw;
    max-height: 85vh;
    border-radius: 4px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
    background: #000;
  }
  .map-video-overlay .map-video-spinner {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: map-spin 0.8s linear infinite;
    pointer-events: none;
  }
  .map-video-overlay .map-video-spinner.hidden { display: none; }
  @keyframes map-spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
  .map-video-overlay .map-video-replay {
    display: none;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.6);
    border: 2px solid rgba(255,255,255,0.8);
    border-radius: 50%;
    width: 64px; height: 64px;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .map-video-overlay .map-video-replay:hover { background: rgba(0,0,0,0.8); }
  .map-video-overlay .map-video-replay svg { width: 28px; height: 28px; fill: #fff; }
  .map-video-overlay .map-video-caption {
    position: absolute;
    bottom: 20px;
    left: 0; right: 0;
    text-align: center;
    color: #ddd;
    font-family: sans-serif;
    font-size: 14px;
    pointer-events: none;
  }
  /* Audio player in popups */
  .map-audio-player { margin: 8px 0 0; width: 100%; }
  .map-audio-player audio { width: 100%; height: 36px; }
</style>
