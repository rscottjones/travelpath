<style>

.travelpath-grid {

  background: #f0f0f0;
  border-radius: 0 0 12px 12px;
  padding: 10px 12px;
}

.travelpath-tile {
  height: 44px;
  border-radius: 5px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: .01em;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 14px;
  margin: 0;
  border: none;
  user-select: none;
  box-sizing: border-box;
  line-height: 1;
  appearance: none;
  -webkit-appearance: none;
  white-space: nowrap;
}

.travelpath-tile--legend,
.travelpath-tile--hub,
.travelpath-tile--stat {

}

.travelpath-tile--legend:hover,

.travelpath-tile--hub:hover,
.travelpath-tile--hub:focus-visible,
.travelpath-tile--stat:hover,
.travelpath-tile--stat:focus-visible {

  transform: translateY(-2px);

  opacity: .88;
  outline: none;
}

.travelpath-tile--segment:active,
.travelpath-tile--legend:active,
.travelpath-tile--hub:active,
.travelpath-tile--stat:active {
  transform: translateY(0);

}

}

}

.travelpath-wrapper { position: relative; z-index: 0; }

.travelpath-popup {

  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 99999;

  animation: travelpath-fadein .15s ease;
}

/* ── Travelpath: SR-only / RSS ── */
.travelpath-sr-only {
  position: absolute;
  width: 1px; height: 1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
}
